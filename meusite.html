
<!DOCTYPE html>
<html>
<head>
    <title>top tintas</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #e0f7fa; /* Um azul bem clarinho e moderno */
            color: #333;
            padding: 50px;
        }
        h1 { color: #00796b; }
        img { 
            width: 300px; 
            border-radius: 15px; /* Deixa as bordas arredondadas */
            box-shadow: 0px 4px 8px rgba(0,0,0,0.2); /* Adiciona uma sombra */
            margin: 20px 0;
        }
        button { 
            padding: 15px 30px; 
            font-size: 16px;
            background-color: #00796b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer; 
        }
        button:hover { background-color: #004d40; } /* Cor muda ao passar o mouse */
    </style>
</head>
<body>

    <h1>Bem-vindo ao meu site atualizado!</h1>
    <p>Olha só essa imagem que eu adicionei:</p>
    
<img src="foto.jpeg" alt="Minha Foto">    <button onclick="avisar()">Clique para uma surpresa</button>

    <script>
        function avisar() {
            alert("Você está ficando muito bom nisso! 🚀");
        }
    </script>

</body>
</html>
